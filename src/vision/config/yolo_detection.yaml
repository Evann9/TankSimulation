# YOLO detection configuration for Tank Challenge /detect endpoint.
# These values are intentionally kept outside code so RL/perception teams can tune them later.
model:
  default_filename: best_final.engine
  imgsz: 416
  iou: 0.70
  max_det: 20
  max_return: 5
  model_confidence: 0.10
  fallback_model_confidence: 0.05
  enable_low_conf_fallback: false
  enable_cache: true
  min_interval_sec: 0.12
  half_if_cuda: true
  warmup_runs: 2

tracking:
  # 1차 병합 범위: production /detect는 동기 방식 유지, 추론 함수만 model.track() 선택 가능.
  enabled: true
  tracker: bytetrack.yaml
  persist: true

classes:
  # 최종 detection public class는 아래 canonical class만 사용한다.
  canonical:
    - rock
    - person
    - tank
    - tent
  fixed_ids:
    tank: 1
    rock: 2
    person: 3
    tent: 4
  aliases:
    blue: person
    red: person
    Tank: tank
    tank: tank
    person: person
    rock: rock
    tent: tent
    wall: wall
  # 1차 병합에서는 wall/car를 YOLO-discovered object에서 제외한다.
  # wall/terrain은 static map 또는 LiDAR terrain-obstacle layer에서 처리한다.
  ignored:
    - car
    - wall
  default_box_color: '#00FF00'
  colors:
    person: '#00FFFF'
    rock: '#FFA500'
    tank: '#FF0000'
    wall: '#00FF00'
    tent: '#FFFF00'
  default_confidence: 0.20
  confidence_thresholds:
    tank: 0.25
    person: 0.25
  close_wall:
    confidence: 0.12
    area_ratio: 0.08
    min_height_ratio: 0.35

bbox_distance:
  # 보류: bbox 기반 거리 추정 알고리즘은 나중에 보조 metadata/fallback으로만 검토한다.
  # 이번 병합에서는 실제 position_map 계산에 사용하지 않는다.
  enabled: false
  publish_metadata: false

preprocess:
  shadow_filter_enabled: false
  shadow_sigma: 35.0
  shadow_strength: 0.75
  shadow_work_scale: 0.35
  shadow_max_side: 960
  clahe_enabled: false
  clahe_clip: 1.5

runtime:
  recognition_log: true
  recognition_log_cache: false
  recognition_log_empty: false
  timing_log: false
  debug_detections: false
