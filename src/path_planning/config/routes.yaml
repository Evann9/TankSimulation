recon_map:
  start: [60.0, 27.0]
  destination: [117.0, 250.0]
  corridor_width: 20.0
  routes:
    # A루트: 서쪽으로 크게 도는 경로
    A:
      - [50.0, 50.0]
      # x=42: 서쪽 나무벽(x≈30)과 중앙 숲(x≈55) 사이 안전 복도 중앙
      - [42.0, 100.0]
      - [42.0, 150.0]
      # x=42, z=200: Rock002_5(x=48.9, z=207.6, r=4.0) 서쪽 접근 — x=50이면 A*가 동쪽 우회해 중앙 숲 충돌 유발
      - [42.0, 200.0]
      # x=85, z=240: Rock002_17(x=93.0, z=236.6, r=4.0) → 유효반경 5.0m, [88-98]×[231-241] 차단
      # x=90은 이 블록 안에 위치(거리 4.5m < 5.0m) — x=85로 서쪽 이격
      - [85.0, 240.0]
    # B루트: 숲 사이 우측 계곡으로 주행 (초반 z=15 틈새 통과 → 완만한 곡선으로 x=125 복도 진입)
    B:
      - [80.0, 30.0]
      # x=115: [120→115] — gap 통과 후 Rock002_6(x=125.8, z=27.1, r=4.0) 서쪽 공간 확보
      # Rock002_6 유효반경 5.0m → x=120.8 서쪽 경계. x=115는 10.8m 이격으로 안전
      - [130.0, 30.0]
      # z=45: Rock002_6 북쪽 경계(z=32.1) 완전 통과 후 점진적 NE 이동
      # z=27 구간 추정 x≈118 → Rock002_6 차단 구역(x≥120.8) 완전 서쪽 유지
      - [145.0, 45.0]
      # z=80: Rock002_11(x=132.8, z=58.5) 북쪽 경계(z=63.5) 완전 통과 후 x=125 복도 진입
      # z=58 구간 추정 x≈122 → Rock002_11 서쪽 경계(x=127.8) 완전 서쪽 유지
      - [130.0, 80.0]
      # Rock002_21(x=131.1)/Rock001_71(x=118.2) z=97~108 협곡 — x=125는 두 바위 사이 통과
      - [130.0, 120.0]
      - [130.0, 160.0]
      - [130.0, 200.0]
      # x=117, z=240: 목적지(117, 250) 직전 서쪽 정렬 — 북쪽 우회 방지
      - [117.0, 240.0]
